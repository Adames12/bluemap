<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BlueMap</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }
    header {
      padding: 10px;
      background: #1e1e1e;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>

<body>
  <header>
    <h3>Moje Minecraft mapa</h3>
  </header>

  <!-- BlueMap viewer -->
  <iframe src="./maps/world/"></iframe>

</body>
</html>
